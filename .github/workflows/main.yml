Name: Continuous Bot Runner

on:
  schedule:
    # سيتم تشغيل السكريبت كل 4 ساعات (المواعيد بتوقيت مكة: 03:00, 07:00, 11:00, 15:00, 19:00, 23:00)
    - cron: '0 */4 * * *' 
  workflow_dispatch:

concurrency:
  group: wolf-bot-running
  # يضمن تشغيل نسخة واحدة فقط؛ ويقتل النسخة القديمة فور بدء الجديدة
  cancel-in-progress: true 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 305 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Execution Logic
        env:
          U_MAIL: ${{ secrets.U_MAIL }}
          U_PASS: ${{ secrets.U_PASS }}
          ENTRY_P: ${{ secrets.ENTRY_P }}
          EXIT_P: ${{ secrets.EXIT_P }}
          MATCH_V: ${{ secrets.MATCH_V }}
          EXEC_V: ${{ secrets.EXEC_V }}
        run: |
          # الحصول على الساعة الحالية بتوقيت مكة (UTC+3)
          HOUR=$(date -u -d "+3 hours" +%H)
          
          echo "⏰ الساعة الآن بتوقيت مكة المكرمة: $HOUR"

          # التوقف الإجباري إذا كانت الساعة بين 7 مساءً (19) و 10 مساءً (22) بتوقيت مكة
          if [ "$HOUR" -ge 19 ] && [ "$HOUR" -lt 22 ]; then
            echo "💤 توقيت الراحة (7 PM - 10 PM). السيرفر سيبقى خاملاً."
            exit 0
          fi
          
          echo "🚀 بدء التشغيل لمدة 5 ساعات (18000 ثانية)..."
          
          # تشغيل البوت في الخلفية
          npm start & 
          BOT_PID=$!
          
          # الانتظار لمدة 5 ساعات (18000 ثانية)
          sleep 18000 
          
          echo "🛑 انتهت الـ 5 ساعات، جاري إغلاق الجلسة للسماح بالتشغيل الجديد..."
          kill $BOT_PID || true
